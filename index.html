<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福+工場・配送安排單</title>
<meta name="description" content="心路基金會幸福+工場禮盒配送安排表單">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:        #faf6f0;
  --warm:         #fff9f2;
  --gold:         #c9a96e;
  --gold-light:   #e8d5b0;
  --gold-dark:    #9e7a45;
  --ink:          #2c2416;
  --ink-mid:      #6b5840;
  --ink-light:    #a8927a;
  --border:       #e5d8c5;
  --border-dark:  #c8b89a;
  --orange:       #d4622a;
  --orange-bg:    #fdf0ea;
  --success:      #4a8a5a;
  --success-bg:   #eef7f1;
  --serif:        'Noto Serif TC', serif;
  --sans:         'Noto Sans TC', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────── */
.header {
  background: var(--ink);
  padding: 40px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.header-badge {
  display: inline-block;
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold-light);
  border: 1px solid rgba(201,169,110,0.35);
  padding: 4px 16px;
  margin-bottom: 14px;
}
.header h1 {
  font-family: var(--serif);
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 600;
  color: #fff8ee;
  letter-spacing: 5px;
  line-height: 1.4;
}
.header h1 em { color: var(--gold); font-style: normal; }
.header p {
  font-size: 12px;
  color: rgba(255,248,238,0.5);
  letter-spacing: 2px;
  margin-top: 8px;
}

/* ── Progress ─────────────────────────────────── */
.progress-bar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0;
  display: flex;
  position: sticky;
  top: 0;
  z-index: 100;
}
.progress-step {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 12px;
  color: var(--ink-light);
  letter-spacing: 1px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  font-family: var(--serif);
}
.progress-step.active {
  color: var(--gold-dark);
  border-bottom-color: var(--gold);
}
.step-num {
  display: inline-block;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid currentColor;
  font-size: 10px;
  line-height: 18px;
  margin-right: 6px;
  text-align: center;
}

/* ── Layout ───────────────────────────────────── */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* ── Cards ────────────────────────────────────── */
.card {
  background: var(--warm);
  border: 1px solid var(--border);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-head {
  background: var(--ink);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-head-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  font-family: var(--serif);
  font-size: 11px;
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-head h2 {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 400;
  color: #fff8ee;
  letter-spacing: 3px;
}
.card-body { padding: 20px; }

/* ── Form Fields ──────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.span2  { grid-column: span 2; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--ink-light);
  font-weight: 500;
}
.field label .req { color: var(--orange); margin-left: 2px; }

.field input, .field textarea {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: #fff;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  width: 100%;
}
.field input:focus, .field textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
}
.field.has-error input { border-color: var(--orange); }
.field .err-text {
  font-size: 11px;
  color: var(--orange);
  display: none;
}
.field.has-error .err-text { display: block; }

/* ── Product Table ────────────────────────────── */
.prod-hint {
  font-size: 12px;
  color: var(--ink-light);
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px dashed var(--border);
}
.prod-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.prod-table th {
  font-size: 11px;
  color: var(--ink-light);
  text-align: left;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
}
.prod-table td { padding: 6px; border-bottom: 1px solid var(--border); }
.alloc-cell { font-size: 12px; font-weight: 500; }
.alloc-ok   { color: var(--success); }
.alloc-err  { color: var(--orange); }

.btn-add-row {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--gold-dark);
  background: none;
  border: 1px dashed var(--gold-light);
  padding: 6px 14px;
  cursor: pointer;
}

/* ── Delivery Cards ───────────────────────────── */
.del-card { border: 1px solid var(--border); margin-bottom: 14px; background: #fff; }
.del-card-head {
  background: var(--cream);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
}
.del-card-body { padding: 16px; }
.qty-row {
  display: flex;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px dashed var(--border);
  gap: 10px;
}
.qty-input {
  width: 80px;
  padding: 6px;
  text-align: center;
  border: 1px solid var(--border);
}
.qty-remain { font-size: 11px; color: var(--ink-light); width: 80px; text-align: right; }
.qty-remain.over { color: var(--orange); }

/* ── Summary & Submit ─────────────────────────── */
.summary {
  background: var(--ink);
  padding: 14px 20px;
  margin-bottom: 24px;
  display: flex;
  gap: 24px;
  color: var(--gold-light);
  font-size: 12px;
}
.summary strong { color: var(--gold); font-size: 16px; }

.btn-submit {
  width: 100%;
  padding: 15px;
  background: var(--gold-dark);
  color: #fff;
  border: none;
  font-family: var(--serif);
  font-size: 16px;
  letter-spacing: 4px;
  cursor: pointer;
}
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Overlays ─────────────────────────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 999;
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.overlay-box { background: #fff; padding: 40px; text-align: center; max-width: 400px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">心路基金會・幸福+工場</div>
  <h1>禮盒<em>配送安排單</em></h1>
</div>

<div class="progress-bar">
  <div class="progress-step active" onclick="scrollToSection('sec-basic')">訂購人</div>
  <div class="progress-step" onclick="scrollToSection('sec-products')">已訂品項</div>
  <div class="progress-step" onclick="scrollToSection('sec-delivery')">配送點</div>
</div>

<main class="container">
  <section id="sec-basic">
    <div class="card">
      <div class="card-head"><div class="card-head-num">一</div><h2>訂購人基本資料</h2></div>
      <div class="card-body">
        <div class="grid-2">
          <div class="field" id="f-cust-name">
            <label>訂購人姓名 <span class="req">*</span></label>
            <input type="text" id="cust-name" placeholder="請填寫姓名">
          </div>
          <div class="field" id="f-cust-phone">
            <label>聯絡電話 <span class="req">*</span></label>
            <input type="tel" id="cust-phone" placeholder="0912-345-678">
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="sec-products">
    <div class="card">
      <div class="card-head"><div class="card-head-num">二</div><h2>已訂購品項與總數量</h2></div>
      <div class="card-body">
        <p class="prod-hint">請填寫品項名稱與總盒數。配送點分配的加總必須等於此處的總數。</p>
        <table class="prod-table">
          <thead>
            <tr><th style="width:50%">品項名稱</th><th style="width:20%">總盒數</th><th style="width:20%">已分配/總數</th><th style="width:10%"></th></tr>
          </thead>
          <tbody id="prod-body"></tbody>
        </table>
        <button class="btn-add-row" onclick="addProdRow()">＋ 新增品項</button>
      </div>
    </div>
  </section>

  <section id="sec-delivery">
    <div class="card">
      <div class="card-head"><div class="card-head-num">三</div><h2>配送點安排</h2></div>
      <div class="card-body">
        <div id="delivery-list"></div>
        <button style="width:100%; padding:12px; border:1px dashed var(--gold); background:none; color:var(--gold-dark); cursor:pointer;" onclick="addDelivery()">＋ 新增配送點</button>
      </div>
    </div>
  </section>

  <div class="summary" id="summary"></div>

  <button class="btn-submit" onclick="submitForm()" id="btn-submit">確認送出配送安排單</button>
</main>

<div class="overlay" id="ov-loading"><div class="overlay-box"><h3>送出中...</h3></div></div>
<div class="overlay" id="ov-success"><div class="overlay-box"><h3>✓ 送出成功</h3><button onclick="location.reload()">重新填寫</button></div></div>

<script>
const GAS_URL = 'YOUR_GAS_URL_HERE';
let products = [];
let deliveries = [];
let prodIdCtr = 0;
let delIdCtr = 0;

function addProdRow(name='', total=0) {
  const id = ++prodIdCtr;
  products.push({ id, name, total });
  renderProdTable();
  syncDeliveryItems();
  updateSummary();
}

function renderProdTable() {
  const tbody = document.getElementById('prod-body');
  tbody.innerHTML = '';
  products.forEach(p => {
    const alloc = calcAllocated(p.id);
    const isOk = alloc === p.total && p.total > 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${p.name}" oninput="updateProd(${p.id},'name',this.value)" style="width:100%; padding:5px;"></td>
      <td><input type="number" value="${p.total||''}" oninput="updateProd(${p.id},'total',+this.value||0)" style="width:80px; text-align:center;"></td>
      <td class="alloc-cell ${isOk?'alloc-ok':'alloc-err'}">${alloc} / ${p.total}</td>
      <td><button onclick="removeProd(${p.id})" style="color:red; background:none; border:none; cursor:pointer;">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function updateProd(id, field, val) {
  const p = products.find(x => x.id === id);
  if (p) p[field] = val;
  if (field === 'total') updateAllocUI();
  if (field === 'name') renderAllDeliveries();
  updateSummary();
}

function removeProd(id) {
  products = products.filter(x => x.id !== id);
  deliveries.forEach(d => d.items = d.items.filter(i => i.prodId !== id));
  renderProdTable();
  renderAllDeliveries();
  updateSummary();
}

function calcAllocated(prodId) {
  return deliveries.reduce((s, d) => s + (d.items.find(i => i.prodId === prodId)?.qty || 0), 0);
}

function updateAllocUI() {
  renderProdTable();
  renderAllDeliveries();
}

function addDelivery() {
  const id = ++delIdCtr;
  const items = products.map(p => ({ prodId: p.id, qty: 0 }));
  deliveries.push({ id, name: '', phone: '', date: '', address: '', items });
  renderAllDeliveries();
  updateSummary();
}

function syncDeliveryItems() {
  deliveries.forEach(d => {
    products.forEach(p => {
      if (!d.items.find(i => i.prodId === p.id)) d.items.push({ prodId: p.id, qty: 0 });
    });
  });
  renderAllDeliveries();
}

function renderAllDeliveries() {
  const list = document.getElementById('delivery-list');
  list.innerHTML = '';
  deliveries.forEach((d, idx) => {
    const card = document.createElement('div');
    card.className = 'del-card';
    card.innerHTML = `
      <div class="del-card-head"><span>配送點 ${idx+1}</span><button onclick="removeDelivery(${d.id})" style="color:red; background:none; border:none;">移除</button></div>
      <div class="del-card-body">
        <div class="grid-2">
          <div class="field"><label>收件人 *</label><input type="text" value="${d.name}" oninput="updateDel(${d.id},'name',this.value)"></div>
          <div class="field"><label>日期 *</label><input type="date" value="${d.date}" oninput="updateDel(${d.id},'date',this.value)"></div>
          <div class="field span2"><label>地址 *</label><input type="text" value="${d.address}" oninput="updateDel(${d.id},'address',this.value)"></div>
        </div>
        <div style="margin-top:10px; font-size:11px; color:#999;">配送數量 (請手填輸入)</div>
        ${products.map(p => {
          const item = d.items.find(i => i.prodId === p.id);
          const alloc = calcAllocated(p.id);
          const remain = p.total - alloc + (item?.qty || 0);
          return `
            <div class="qty-row">
              <span style="flex:1;">${p.name || '(未命名品項)'}</span>
              <input type="number" class="qty-input" value="${item?.qty || 0}" oninput="updateDelItem(${d.id},${p.id},+this.value||0)">
              <span class="qty-remain">剩餘 ${Math.max(0, remain)}</span>
            </div>`;
        }).join('')}
      </div>
    `;
    list.appendChild(card);
  });
}

function updateDel(id, field, val) {
  const d = deliveries.find(x => x.id === id);
  if (d) d[field] = val;
}

function updateDelItem(delId, prodId, val) {
  const d = deliveries.find(x => x.id === delId);
  const item = d?.items.find(i => i.prodId === prodId);
  if (item) item.qty = val;
  updateAllocUI();
  updateSummary();
}

function removeDelivery(id) {
  deliveries = deliveries.filter(x => x.id !== id);
  updateAllocUI();
  updateSummary();
}

function updateSummary() {
  const total = products.reduce((s, p) => s + p.total, 0);
  const alloc = products.reduce((s, p) => s + calcAllocated(p.id), 0);
  document.getElementById('summary').innerHTML = `
    <div>訂購總數: <strong>${total}</strong></div>
    <div>已分配數: <strong>${alloc}</strong></div>
    <div>待分配數: <strong>${total - alloc}</strong></div>
  `;
}

function validate() {
  if (!document.getElementById('cust-name').value.trim()) { alert('請填寫訂購人姓名'); return false; }
  if (products.length === 0) { alert('請至少新增一個品項'); return false; }
  
  // 檢查品項名稱與數量一致性
  for (const p of products) {
    if (!p.name.trim()) { alert('請填寫所有品項的名稱'); return false; }
    const alloc = calcAllocated(p.id);
    if (alloc !== p.total) {
      alert(`品項「${p.name}」的分配數量錯誤！\n訂購總數為 ${p.total}，但配送分配總計為 ${alloc}。\n請修正至完全相符後再送出。`);
      return false;
    }
  }

  if (deliveries.length === 0) { alert('請至少新增一個配送點'); return false; }
  const invalidDel = deliveries.find(d => !d.name.trim() || !d.date || !d.address.trim());
  if (invalidDel) { alert('請完整填寫配送點的收件人、日期與地址'); return false; }

  return true;
}

async function submitForm() {
  if (!validate()) return;

  document.getElementById('btn-submit').disabled = true;
  document.getElementById('ov-loading').classList.add('show');

  const payload = {
    customer: document.getElementById('cust-name').value,
    phone: document.getElementById('cust-phone').value,
    products: products,
    deliveries: deliveries
  };

  try {
    // 模擬送出
    console.log('Sending...', payload);
    setTimeout(() => {
      document.getElementById('ov-loading').classList.remove('show');
      document.getElementById('ov-success').classList.add('show');
    }, 1500);
  } catch (e) {
    alert('送出失敗，請檢查網路連線');
    document.getElementById('btn-submit').disabled = false;
  }
}

function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

// 初始列
addProdRow();
</script>
</body>
</html>
