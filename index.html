<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福+工場・配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --ink: #2c2416; --orange: #d4622a; --sans: 'Noto Sans TC', sans-serif; }
body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; }
.header { background: var(--ink); padding: 30px; text-align: center; color: #fff8ee; border-bottom: 3px solid var(--gold); }
.container { max-width: 860px; margin: 0 auto; padding: 20px; }
.card { background: var(--warm); border: 1px solid #e5d8c5; border-radius: 4px; margin-bottom: 20px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.field { margin-bottom: 15px; display: flex; flex-direction: column; }
.field label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--ink-mid); }
.field input, .field select, .field textarea { padding: 12px; border: 1px solid #d8c8b0; border-radius: 4px; background: #fff; font-size: 15px; }
.summary-bar { background: var(--ink); color: var(--gold); padding: 15px; border-radius: 4px; margin: 20px 0; display: flex; justify-content: space-around; font-weight: bold; position: sticky; bottom: 80px; z-index: 10; }
.btn-add { background: none; border: 1.5px dashed var(--gold); color: var(--gold); padding: 10px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; margin-top: 10px; }
.btn-submit { width: 100%; padding: 18px; background: var(--gold); color: white; border: none; font-size: 18px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(201,169,110,0.3); }
.btn-submit:disabled { background: #ccc; cursor: not-allowed; }
.error-text { color: var(--orange); font-size: 12px; margin-top: 5px; font-weight: bold; }
.del-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; align-items: center; justify-content: center; z-index: 1000; }
.overlay.show { display: flex; }
.overlay-box { background: white; color: black; padding: 40px; border-radius: 8px; text-align: center; max-width: 80%; }
</style>
</head>
<body>

<div class="header">
  <div style="font-size: 12px; letter-spacing: 3px; color: var(--gold); margin-bottom: 5px;">心路基金會</div>
  <h1 style="margin:0; font-family: 'Noto Serif TC';">幸福+工場・配送安排單</h1>
</div>

<main class="container">
  <div class="card">
    <h3 style="border-left: 4px solid var(--gold); padding-left: 10px; margin-top:0;">一、訂購人資料</h3>
    <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name"></div>
    <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone"></div>
    <div class="field"><label>備註說明</label><textarea id="cust-note" rows="2"></textarea></div>
  </div>

  <div class="card">
    <h3 style="border-left: 4px solid var(--gold); padding-left: 10px; margin-top:0;">二、已訂購品項</h3>
    <div id="prod-list"></div>
    <button class="btn-add" onclick="addProd()">＋ 新增品項</button>
  </div>

  <div class="card">
    <h3 style="border-left: 4px solid var(--gold); padding-left: 10px; margin-top:0;">三、配送點安排</h3>
    <div id="delivery-list"></div>
    <button class="btn-add" onclick="addDel()">＋ 新增配送點</button>
  </div>

  <div class="summary-bar" id="summary"></div>
  <div id="error-msg" class="error-text" style="text-align:center; margin-bottom:10px; display:none;">配送總數與訂購總數不符，請檢查後再送出。</div>

  <button class="btn-submit" type="button" onclick="submitForm()" id="btn-submit">確認送出配送安排單</button>
</main>

<div class="overlay" id="ov-loading"><div class="overlay-box"><h2>傳送中...</h2><p>請稍候，正在同步至試算表與發送 Email</p></div></div>
<div class="overlay" id="ov-success"><div class="overlay-box"><h2>送出成功！</h2><p>資料已存入試算表，業務人員將會收到通知。</p><button onclick="location.reload()" style="margin-top:20px; padding:10px 20px;">關閉並重新填寫</button></div></div>

<script>
// ★ 請在此處更換您的 GAS 網址
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
                 
// 預設禮盒清單（下拉選單用）
const PRODUCT_OPTIONS = ["幸福禮盒A", "心路餅乾B", "典藏禮盒C", "手作禮盒D", "自定義"];

let products = [];
let deliveries = [];

function addProd() {
  products.push({ id: Date.now(), name: PRODUCT_OPTIONS[0], total: 0 });
  render();
}

function addDel() {
  deliveries.push({ id: Date.now(), name: '', phone: '', date: '', address: '', items: {} });
  render();
}

function render() {
  // 1. 渲染品項
  const pDiv = document.getElementById('prod-list');
  pDiv.innerHTML = products.map(p => `
    <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
      <select onchange="updateP(${p.id},'name',this.value)" style="flex:2;">
        ${PRODUCT_OPTIONS.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
      </select>
      ${p.name==='自定義'?`<input type="text" placeholder="輸入名稱" oninput="updateP(${p.id},'customName',this.value)" style="flex:2;">`:''}
      <input type="number" placeholder="總盒數" style="flex:1;" oninput="updateP(${p.id},'total',+this.value)" value="${p.total||''}">
      <button onclick="removeP(${p.id})" style="border:none; color:red; background:none; cursor:pointer;">✕</button>
    </div>
  `).join('');

  // 2. 渲染配送點
  const dDiv = document.getElementById('delivery-list');
  dDiv.innerHTML = deliveries.map((d, idx) => `
    <div class="card" style="background:#fff; border: 1px solid var(--gold-light);">
      <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span style="font-weight:bold; color:var(--gold);">配送點 ${idx+1}</span>
        <button onclick="removeD(${d.id})" style="border:none; color:red; background:none; cursor:pointer;">刪除此點</button>
      </div>
      <div class="field"><label>收件人姓名 *</label><input type="text" oninput="updateD(${d.id},'name',this.value)" value="${d.name}"></div>
      <div class="field"><label>收件地址 *</label><input type="text" oninput="updateD(${d.id},'address',this.value)" value="${d.address}"></div>
      <div class="field"><label>希望配送日期 *</label><input type="date" oninput="updateD(${d.id},'date',this.value)" value="${d.date}"></div>
      <div style="background:var(--cream); padding:10px; border-radius:4px;">
        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">分配品項數量：</label>
        ${products.map(p => {
          const pName = p.name === '自定義' ? (p.customName || '未命名') : p.name;
          return `
            <div class="del-item">
              <span style="flex:2; font-size:13px;">${pName}</span>
              <input type="number" placeholder="盒數" style="width:70px; padding:5px;" 
                     oninput="updateDI(${d.id}, ${p.id}, +this.value)" value="${d.items[p.id]||''}">
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
  
  updateSummary();
}

function updateP(id,f,v){ products.find(x=>x.id===id)[f]=v; render(); }
function removeP(id){ products = products.filter(x=>x.id!==id); render(); }
function updateD(id,f,v){ deliveries.find(x=>x.id===id)[f]=v; }
function removeD(id){ deliveries = deliveries.filter(x=>x.id!==id); render(); }
function updateDI(did, pid, v) {
  deliveries.find(x=>x.id===did).items[pid] = v;
  updateSummary();
}

function updateSummary() {
  const total = products.reduce((s,p)=>s+p.total,0);
  let allocated = 0;
  deliveries.forEach(d => {
    Object.values(d.items).forEach(v => allocated += (v||0));
  });

  const diff = total - allocated;
  const sDiv = document.getElementById('summary');
  sDiv.innerHTML = `<div>訂購總計: ${total}</div> <div>已分配: ${allocated}</div> <div style="color:${diff===0?'#6f6':'#f66'}">待分配: ${diff}</div>`;
  
  const btn = document.getElementById('btn-submit');
  const err = document.getElementById('error-msg');
  
  if (total > 0 && diff === 0) {
    btn.disabled = false;
    err.style.display = 'none';
  } else {
    btn.disabled = true;
    err.style.display = (total > 0 && allocated > 0) ? 'block' : 'none';
  }
}

async function submitForm() {
  const custName = document.getElementById('cust-name').value;
  if (!custName) { alert('請填寫訂購人姓名'); return; }

  document.getElementById('ov-loading').classList.add('show');
  
  const payload = {
    customerName: custName,
    customerPhone: document.getElementById('cust-phone').value,
    note: document.getElementById('cust-note').value,
    products: products.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.total })),
    deliveries: deliveries.map(d => ({
      name: d.name, address: d.address, date: d.date,
      items: Object.keys(d.items).map(pid => ({
        productName: products.find(p=>p.id==pid)?.name,
        qty: d.items[pid]
      })).filter(i => i.qty > 0)
    })),
    submittedAt: new Date().toLocaleString()
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').classList.remove('show');
    document.getElementById('ov-success').classList.add('show');
  } catch (e) {
    alert('連線失敗，請檢查網路設定');
    document.getElementById('ov-loading').classList.remove('show');
  }
}

// 初始化
addProd();
</script>
</body>
</html>
