<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送調度系統 (Pro)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  :root { 
    --bg: #F7F5F0; --primary: #3B3327; --accent: #C9A96E; --text: #4A4036; 
    --border: #E8E2D9; --orange: #E07A5F; --green: #4F8A65; --card-bg: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 260px; }
  .header { background: var(--primary); padding: 20px 15px; text-align: center; color: #fff; border-bottom: 5px solid var(--accent); }
  .wrapper { max-width: 800px; margin: 0 auto; padding: 0 15px; }
  
  .main-card, .date-group, .import-card { 
    background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); 
    padding: 20px; margin-top: 20px; box-shadow: 0 6px 16px rgba(59, 51, 39, 0.05); 
  }
  .import-card { border: 2px dashed var(--accent); background: #fdfaf3; }
  
  .date-group { padding: 0; overflow: hidden; }
  .date-head { background: #FAFAF7; padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .place-card { margin: 15px; padding: 18px; background: #FAFAF7; border: 1px solid var(--border); border-radius: 12px; border-left: 6px solid var(--accent); }
  
  input, select { width: 100%; padding: 14px; border: 1px solid #D6D0C4; border-radius: 10px; font-size: 16px; margin-bottom: 10px; background: #fff; }
  .input-label { font-size: 13px; font-weight: 700; color: #8A7E6E; margin-bottom: 6px; display: block; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .qty-field { width: 85px !important; text-align: center; font-weight: 700; border: 2px solid var(--accent) !important; color: var(--primary); margin-bottom: 0; }
  
  .btn-ghost { background: transparent; border: 2px dashed var(--accent); color: var(--accent); padding: 14px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .btn-remove { border: none; background: #FFF0F0; color: #E05F5F; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: 700; }
  
  .footer-summary { background: #FFF; padding: 20px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
  .status-pills { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
  .pill { padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; flex-shrink: 0; }
  .pill-ok { background: var(--green); }
  .pill-wait { background: var(--orange); }
  
  .btn-primary { width: 100%; max-width: 450px; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; display: block; margin: 0 auto; box-shadow: 0 4px 15px rgba(201, 169, 110, 0.4); }
  .btn-primary:disabled { background: #D6D0C4; box-shadow: none; cursor: not-allowed; }
</style>
</head>
<body>

<header class="header"><h2>幸福+工場・配送調度 Pro</h2></header>

<div class="wrapper">
  <div class="main-card">
    <div class="grid-2">
      <div><span class="input-label">訂購人姓名 *</span><input type="text" id="cust-name" oninput="syncCustData()"></div>
      <div><span class="input-label">聯絡電話 *</span><input type="tel" id="cust-phone" oninput="syncCustData()"></div>
    </div>
    <div id="main-prod-list"></div>
    <button class="btn-ghost" onclick="addMainProd()">＋ 新增產品總量</button>
  </div>

  <div class="import-card">
    <h3 style="margin:0 0 10px 0; color:var(--primary);">📤 批次匯入地址 (Excel)</h3>
    <p style="font-size:13px; color:#666; margin-bottom:15px;">
      欄位順序請依序填寫：<br>
      <b>[到貨日期] | [收件人] | [電話] | [地址] | [產品名稱] | [數量]</b>
    </p>
    <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" style="padding:10px; border:none; background:#fff;">
    <button class="btn-primary" style="font-size:15px; padding:12px; border-radius:8px;" onclick="importExcel()">開始讀取並填入</button>
  </div>

  <div id="date-group-container"></div>
  <button class="btn-ghost" style="background:var(--primary); color:white; border:none; margin-top:25px;" onclick="addDateGroup()">＋ 手動建立配送日期</button>
</div>

<div class="footer-summary">
  <div class="status-pills" id="summary-pills"></div>
  <button class="btn-primary" id="btn-submit" onclick="submitForm()" disabled>請填寫基本資訊</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(59,51,39,0.9); z-index:9999; color:#fff; align-items:center; justify-content:center; flex-direction:column;">
  <div id="loading-msg"><h2>處理中...</h2></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精彩世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];
const HOLIDAYS = ["2026-01-01", "2026-02-16", "2026-02-17", "2026-02-18", "2026-02-19", "2026-02-20", "2026-02-27", "2026-04-03", "2026-04-06", "2026-05-01", "2026-06-19", "2026-09-25", "2026-10-09"];

let customerData = { name: '', phone: '' };
let mainProducts = []; // {id, name, customName, totalQty}
let dateGroups = []; // {id, date, addresses: [{id, receiver, rPhone, address, items: {prodId: qty}}]}

function syncCustData() {
  customerData.name = document.getElementById('cust-name').value;
  customerData.phone = document.getElementById('cust-phone').value;
  updateSummary();
}

function addMainProd(initialName = PRODUCT_LIST[0]) {
  const p = { id: Date.now() + Math.random(), name: initialName, customName: '', totalQty: '' };
  mainProducts.push(p);
  render();
  return p;
}

function addDateGroup() {
  const g = { id: Date.now() + Math.random(), date: '', addresses: [] };
  dateGroups.push(g);
  render();
  return g;
}

// 核心功能：Excel 匯入
function importExcel() {
  const file = document.getElementById('excel-file').files[0];
  if(!file) return alert("請先選擇 Excel 檔案！");
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

    // 排除標題列，處理資料
    rows.slice(1).forEach(row => {
      if(!row[0] || !row[1]) return; // 跳過空行

      let dateVal = row[0]; // 格式可能是 YYYY-MM-DD 或 Excel 序號
      let receiver = row[1];
      let phone = row[2] ? row[2].toString() : '';
      let address = row[3];
      let prodName = row[4];
      let qty = parseInt(row[5]) || 0;

      // 1. 確保產品已在總表
      let targetProd = mainProducts.find(p => p.name === prodName || p.customName === prodName);
      if(!targetProd) {
        targetProd = addMainProd(PRODUCT_LIST.includes(prodName) ? prodName : '自定義');
        if(targetProd.name === '自定義') targetProd.customName = prodName;
      }
      
      // 2. 確保日期分組存在
      let group = dateGroups.find(g => g.date === dateVal);
      if(!group) {
        group = addDateGroup();
        group.date = dateVal;
      }

      // 3. 建立收件地址
      let addrObj = { id: Date.now() + Math.random(), receiver, rPhone: phone, address, items: {} };
      addrObj.items[targetProd.id] = qty;
      group.addresses.push(addrObj);
    });

    alert("匯入完成！請核對資料並填寫「各品項總數量」。");
    render();
  };
  reader.readAsArrayBuffer(file);
}

function render() {
  const mList = document.getElementById('main-prod-list');
  mList.innerHTML = mainProducts.map(p => `
    <div style="background:#FAFAF7; border:1px solid #eee; padding:15px; border-radius:12px; margin-bottom:10px;">
      <div style="display:flex; gap:10px; align-items:center;">
        <select style="flex:1; margin-bottom:0;" onchange="mainProducts.find(m=>m.id===${p.id}).name=this.value; render();">
          ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
        </select>
        <input type="number" class="qty-field" placeholder="總量" value="${p.totalQty}" oninput="mainProducts.find(m=>m.id===${p.id}).totalQty=Math.abs(Math.floor(this.value)) || ''; updateSummary();">
        <button style="border:none;background:none;color:red;" onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id}); render();">✕</button>
      </div>
      ${p.name==='自定義'?`<input type="text" placeholder="品名" style="margin-top:8px; margin-bottom:0;" value="${p.customName}" oninput="mainProducts.find(m=>m.id===${p.id}).customName=this.value; updateSummary();">`:''}
    </div>
  `).join('');

  const gContainer = document.getElementById('date-group-container');
  gContainer.innerHTML = dateGroups.map(g => `
    <div class="date-group">
      <div class="date-head">
        <input type="date" value="${g.date}" onchange="g.date=this.value; updateSummary();" style="width:170px; margin:0;">
        <button class="btn-remove" onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id}); render();">刪除日期</button>
      </div>
      ${g.addresses.map((a, idx) => `
        <div class="place-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <b>地點 ${idx+1}</b> 
            <button style="border:none;background:none;color:red;font-size:12px;" onclick="g.addresses=g.addresses.filter(x=>x.id!==${a.id}); render();">移除</button>
          </div>
          <div class="grid-2">
            <input type="text" placeholder="收件人" value="${a.receiver}" oninput="a.receiver=this.value; updateSummary();">
            <input type="tel" placeholder="電話" value="${a.rPhone}" oninput="a.rPhone=this.value; updateSummary();">
          </div>
          <input type="text" placeholder="地址" value="${a.address}" oninput="a.address=this.value; updateSummary();">
          <div style="border-top:1px dashed #ccc; padding-top:10px;">
            ${mainProducts.map(p => `
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <span style="font-size:12px;">${p.name==='自定義'?p.customName:p.name}</span>
                <input type="number" class="qty-field" value="${a.items[p.id]||''}" oninput="a.items[${p.id}]=Math.abs(Math.floor(this.value)); updateSummary();">
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <button class="btn-ghost" style="width:calc(100% - 30px); margin:10px 15px;" onclick="addAddress(${g.id})">＋ 同日新增地點</button>
    </div>
  `).join('');
  updateSummary();
}

function addAddress(gId) {
  const g = dateGroups.find(x => x.id === gId);
  g.addresses.push({ id: Date.now() + Math.random(), receiver: '', rPhone: '', address: '', items: {} });
  render();
}

function updateSummary() {
  const btn = document.getElementById('btn-submit');
  const pills = document.getElementById('summary-pills');
  let allMatched = true;

  pills.innerHTML = mainProducts.map(p => {
    let target = parseInt(p.totalQty) || 0;
    let current = 0;
    dateGroups.forEach(g => g.addresses.forEach(a => { current += parseInt(a.items[p.id]) || 0; }));
    const ok = (target > 0 && target === current);
    if (!ok) allMatched = false;
    return `<span class="pill ${ok ? 'pill-ok' : 'pill-wait'}">${(p.name==='自定義'?p.customName:p.name).substring(0,5)}: ${current}/${target}</span>`;
  }).join('');

  const nameOk = customerData.name.trim() !== "";
  if (nameOk && dateGroups.length > 0) {
    btn.disabled = false;
    btn.innerText = allMatched ? "確認送出單據" : "總盒數不符，確認送出？";
    btn.style.background = allMatched ? "var(--green)" : "var(--orange)";
  } else {
    btn.disabled = true;
    btn.innerText = "請填寫必要資訊";
  }
}

async function submitForm() {
  document.getElementById('ov-loading').style.display = 'flex';
  const payload = {
    customer: customerData.name,
    phone: "'" + customerData.phone,
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => {
        let items = [];
        mainProducts.forEach(p => { if(a.items[p.id]) items.push({ name: p.name==='自定義'?p.customName:p.name, qty: a.items[p.id] }); });
        return { receiver: a.receiver, phone: "'" + a.rPhone, address: a.address, items: items };
      })
    }))
  };
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    alert("送出成功！");
    location.reload();
  } catch(e) {
    alert("失敗");
    document.getElementById('ov-loading').style.display = 'none';
  }
}
addMainProd();
</script>
</body>
</html>
