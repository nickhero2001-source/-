<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・全方位配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --gold-dark: #9e7a45;
    --ink: #2c2416; --ink-mid: #6b5840; --border: #e5d8c5; --orange: #d4622a;
    --sans: 'Noto Sans TC', sans-serif; --serif: 'Noto Serif TC', serif;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; padding-bottom: 180px; -webkit-font-smoothing: antialiased; }

  .header { background: var(--ink); padding: 40px 20px; text-align: center; color: #fff8ee; border-bottom: 5px solid var(--gold); }
  .header h1 { font-family: var(--serif); font-size: 24px; margin: 0; letter-spacing: 2px; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 15px; }

  .section-label { font-family: var(--serif); color: var(--gold-dark); font-weight: 600; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; font-size: 18px; }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  .card { background: var(--warm); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(44,36,22,0.05); overflow: hidden; }
  .card-head { background: var(--ink); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: #fff8ee; }
  .card-body { padding: 20px; }

  /* 配送日期容器 */
  .date-group { border: 2px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; background: #fff; }
  .date-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--cream); padding-bottom: 10px; }
  
  /* 地址小卡 */
  .addr-card { background: var(--warm); border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; }

  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--ink-mid); }
  .field input, .field select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; }

  .qty-input { width: 90px !important; text-align: center; font-weight: bold; border: 2px solid var(--gold) !important; color: var(--ink); font-size: 18px !important; height: 45px; }

  .btn-add { background: #fff; border: 2px dashed var(--gold); color: var(--gold-dark); padding: 12px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: 600; margin-top: 10px; }
  .btn-remove { color: var(--orange); background: none; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }

  .summary-bar { background: var(--ink); color: #fff; padding: 15px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100; border-top: 3px solid var(--gold); }
  .btn-submit { width: 100%; max-width: 400px; padding: 16px; background: var(--gold); color: #fff; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; display: block; margin: 10px auto 0; }
  .btn-submit:disabled { background: #555; color: #888; }
  
  .status-tag { font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-left: 10px; }
  .status-fail { background: #ffebeb; color: #d4622a; }
  .status-pass { background: #ebffef; color: #2d8a54; }

  @media (min-width: 768px) { .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; } }
</style>
</head>
<body>

<header class="header">
  <h1>禮盒<em>配送安排單</em></h1>
</header>

<main class="container">
  <div class="section-label">1. 訂單總量與訂購人</div>
  <section class="card">
    <div class="card-body">
      <div class="field-grid">
        <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()"></div>
        <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone"></div>
      </div>
      <div style="margin-top:10px; background:#fff; padding:15px; border:1px solid var(--border); border-radius:8px;">
        <label style="font-weight:bold; color:var(--gold-dark); display:block; margin-bottom:10px;">請先設定本次訂購的【品項】與【總盒數】：</label>
        <div id="main-prod-container"></div>
        <button class="btn-add" onclick="addMainProd()">＋ 新增訂購品項</button>
      </div>
    </div>
  </section>

  <div class="section-label">2. 配送日期與地點規劃</div>
  <div id="date-group-container"></div>
  <button class="btn-add" style="background:var(--ink); color:var(--gold); border-style:solid;" onclick="addDateGroup()">＋ 新增一個出貨日期</button>
</main>

<div class="summary-bar">
  <div id="summary-detail" style="font-size:13px; display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:5px;"></div>
  <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>請完成數量分配</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; color:#fff; align-items:center; justify-content:center; flex-direction:column;"><h2>傳送中...</h2></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];

let mainProducts = []; // 總量
let dateGroups = [];   // 日期 -> 地址 -> 品項

// --- 1. 總量區邏輯 ---
function addMainProd() {
  mainProducts.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', totalQty: '' });
  render();
}

function updateMainProd(id, f, v) {
  let p = mainProducts.find(x => x.id === id);
  p[f] = v;
  if(f === 'name') render(); else updateSummary();
}

// --- 2. 日期區邏輯 ---
function addDateGroup() {
  const gId = Date.now();
  dateGroups.push({ id: gId, date: '', addresses: [{ id: gId+1, receiver: '', address: '', items: {} }] });
  render();
}

function addAddr(gId) {
  dateGroups.find(g => g.id === gId).addresses.push({ id: Date.now(), receiver: '', address: '', items: {} });
  render();
}

function updateDelDate(gId, val) {
  const d = new Date(val);
  if (d.getDay() === 0 || d.getDay() === 6) {
    alert("週六日不配送，請選平日");
    return;
  }
  dateGroups.find(g => g.id === gId).date = val;
  updateSummary();
}

function updateAddrVal(gId, aId, f, v) {
  dateGroups.find(g => g.id === gId).addresses.find(a => a.id === aId)[f] = v;
  updateSummary();
}

function updateItemQty(gId, aId, pId, v) {
  dateGroups.find(g => g.id === gId).addresses.find(a => a.id === aId).items[pId] = v;
  updateSummary();
}

// --- 3. 渲染與統計 ---
function render() {
  // 總量區
  const mContainer = document.getElementById('main-prod-container');
  mContainer.innerHTML = mainProducts.map(p => `
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
      <select onchange="updateMainProd(${p.id},'name',this.value)" style="flex:2;">
        ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
      </select>
      <input type="number" inputmode="numeric" class="qty-input" placeholder="總數" value="${p.totalQty}" oninput="updateMainProd(${p.id},'totalQty',this.value)">
      <button class="btn-remove" onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id});render();">✕</button>
    </div>
    ${p.name==='自定義'?`<input type="text" placeholder="自定義品名" style="margin-bottom:10px;" value="${p.customName}" oninput="updateMainProd(${p.id},'customName',this.value)">`:''}
  `).join('');

  // 日期區
  const gContainer = document.getElementById('date-group-container');
  gContainer.innerHTML = dateGroups.map(g => `
    <div class="date-group">
      <div class="date-header">
        <div style="display:flex; align-items:center; gap:10px;">
          <span style="font-weight:bold;">出貨日期：</span>
          <input type="date" value="${g.date}" onchange="updateDelDate(${g.id}, this.value)" style="width:160px;">
        </div>
        <button class="btn-remove" onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id});render();">移除此日期</button>
      </div>
      
      ${g.addresses.map((a, idx) => `
        <div class="addr-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:14px; font-weight:bold; color:var(--gold-dark);">📍 配送地址 ${idx+1}</span>
            <button class="btn-remove" onclick="removeAddr(${g.id}, ${a.id})">移除地址</button>
          </div>
          <div class="field-grid">
            <div class="field"><label>收件人</label><input type="text" value="${a.receiver}" oninput="updateAddrVal(${g.id},${a.id},'receiver',this.value)"></div>
            <div class="field"><label>完整地址</label><input type="text" value="${a.address}" oninput="updateAddrVal(${g.id},${a.id},'address',this.value)"></div>
          </div>
          <div style="font-size:13px; font-weight:bold; margin-bottom:8px;">分配數量：</div>
          ${mainProducts.map(p => {
            const pLabel = p.name==='自定義' ? (p.customName||'自定義') : p.name;
            return `
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; background:#fff; padding:8px; border-radius:4px;">
                <span style="font-size:14px;">${pLabel}</span>
                <input type="number" inputmode="numeric" class="qty-input" placeholder="0" value="${a.items[p.id]||''}" oninput="updateItemQty(${g.id},${a.id},${p.id},this.value)">
              </div>
            `;
          }).join('')}
        </div>
      `).join('')}
      <button class="btn-add" onclick="addAddr(${g.id})">＋ 在此日期下新增配送地址</button>
    </div>
  `).join('');
  updateSummary();
}

function removeAddr(gId, aId) {
  const g = dateGroups.find(x => x.id === gId);
  g.addresses = g.addresses.filter(a => a.id !== aId);
  render();
}

function updateSummary() {
  const detail = document.getElementById('summary-detail');
  let allOk = true;
  let html = '';

  if(mainProducts.length === 0) allOk = false;

  mainProducts.forEach(p => {
    const pLabel = p.name==='自定義' ? (p.customName||'未命名') : p.name;
    const target = Number(p.totalQty) || 0;
    let current = 0;
    
    dateGroups.forEach(g => {
      g.addresses.forEach(a => {
        current += (Number(a.items[p.id]) || 0);
      });
    });

    const isMatch = (target > 0 && target === current);
    if(!isMatch) allOk = false;

    html += `<span class="status-tag ${isMatch?'status-pass':'status-fail'}">${pLabel}: ${current}/${target}</span>`;
  });

  detail.innerHTML = html;

  // 基本欄位檢查
  const nameOk = document.getElementById('cust-name').value.trim() !== '';
  const dateOk = dateGroups.length > 0 && dateGroups.every(g => g.date && g.addresses.every(a => a.receiver && a.address));
  
  const btn = document.getElementById('btn-submit');
  if(nameOk && dateOk && allOk) {
    btn.disabled = false;
    btn.innerText = "確認送出配送安排單";
  } else {
    btn.disabled = true;
    btn.innerText = "請完成所有資料與盒數分配";
  }
}

async function submitForm() {
  document.getElementById('ov-loading').style.display = 'flex';
  const payload = {
    customer: document.getElementById('cust-name').value,
    phone: document.getElementById('cust-phone').value,
    mainProducts: mainProducts.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.totalQty })),
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => ({
        receiver: a.receiver,
        address: a.address,
        items: Object.keys(a.items).map(pid => {
          const p = mainProducts.find(x => x.id == pid);
          return { name: p.name==='自定義'?p.customName:p.name, qty: a.items[pid] };
        }).filter(i => i.qty > 0)
      }))
    }))
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').innerHTML = '<div style="background:#fff;padding:40px;border-radius:12px;text-align:center;color:#2c2416;"><h1>✓ 送出成功</h1><button onclick="location.reload()" style="padding:10px 20px;background:var(--gold);border:none;color:#fff;border-radius:6px;cursor:pointer;">返回</button></div>';
  } catch(e) {
    alert("傳送失敗");
    document.getElementById('ov-loading').style.display = 'none';
  }
}

addMainProd();
</script>
</body>
</html>
