<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福+工場・配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── 精簡版樣式 ── */
:root { --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --ink: #2c2416; --orange: #d4622a; --sans: 'Noto Sans TC', sans-serif; --serif: 'Noto Serif TC', serif; }
body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; }
.header { background: var(--ink); padding: 30px; text-align: center; color: #fff8ee; border-bottom: 3px solid var(--gold); }
.container { max-width: 860px; margin: 0 auto; padding: 20px; }
.card { background: var(--warm); border: 1px solid #e5d8c5; border-radius: 4px; margin-bottom: 20px; padding: 20px; }
.field { margin-bottom: 15px; display: flex; flex-direction: column; }
.field label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
.field input, .field textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
.has-error input { border-color: var(--orange); }
.summary { background: var(--ink); color: var(--gold); padding: 15px; border-radius: 4px; margin: 20px 0; display: flex; justify-content: space-around; font-size: 14px; }
.btn-submit { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; font-size: 18px; cursor: pointer; font-family: var(--serif); }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; align-items: center; justify-content: center; z-index: 1000; }
.overlay.show { display: flex; }
.overlay-box { background: white; color: black; padding: 30px; border-radius: 8px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>禮盒配送安排單</h1>
</div>

<main class="container">
  <div class="card">
    <h3>一、訂購人資料</h3>
    <div class="field" id="f-cust-name">
      <label>訂購人姓名 *</label>
      <input type="text" id="cust-name" placeholder="請填寫姓名">
    </div>
    <div class="field" id="f-cust-phone">
      <label>聯絡電話 *</label>
      <input type="tel" id="cust-phone" placeholder="0912-345-678">
    </div>
    <div class="field">
      <label>備註</label>
      <textarea id="cust-note"></textarea>
    </div>
  </div>

  <div class="card">
    <h3>二、已訂購品項</h3>
    <div id="prod-list"></div>
    <button type="button" onclick="addProdRow()" style="margin-top:10px;">＋ 新增品項</button>
  </div>

  <div class="card">
    <h3>三、配送點安排</h3>
    <div id="delivery-list"></div>
    <button type="button" onclick="addDelivery()" style="margin-top:10px; width:100%;">＋ 新增配送點</button>
  </div>

  <div class="summary" id="summary"></div>

  <button class="btn-submit" type="button" onclick="submitForm()" id="btn-submit">確認送出表單</button>
</main>

<div class="overlay" id="ov-loading"><div class="overlay-box"><h3>送出中...</h3></div></div>
<div class="overlay" id="ov-success"><div class="overlay-box"><h3>送出成功！</h3><button onclick="location.reload()">重新填寫</button></div></div>

<script>
// ★ 重要：請在此處換成您的 GAS 網址
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyccQ59ryobwSBx21vhGc_-Vw7rMefEsa9qHQ1XrGEcy8686Pfwd_NMOnZAPCqRWpXV/exec';

let products = [];
let deliveries = [];
let pId = 0;
let dId = 0;

function addProdRow() {
  const id = ++pId;
  products.push({ id: id, name: '', total: 0 });
  render();
}

function addDelivery() {
  const id = ++dId;
  deliveries.push({ id: id, name: '', phone: '', date: '', address: '', items: [] });
  render();
}

function render() {
  // 渲染品項
  const pDiv = document.getElementById('prod-list');
  pDiv.innerHTML = products.map(p => `
    <div style="display:flex; gap:10px; margin-bottom:5px;">
      <input type="text" placeholder="品項名稱" oninput="updateP(${p.id},'name',this.value)" value="${p.name}">
      <input type="number" placeholder="數量" style="width:80px;" oninput="updateP(${p.id},'total',+this.value)" value="${p.total}">
    </div>
  `).join('');

  // 渲染配送點
  const dDiv = document.getElementById('delivery-list');
  dDiv.innerHTML = deliveries.map(d => `
    <div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; background:#fff;">
      <div class="field"><label>收件人姓名</label><input type="text" oninput="updateD(${d.id},'name',this.value)"></div>
      <div class="field"><label>配送地址</label><input type="text" oninput="updateD(${d.id},'address',this.value)"></div>
      <div class="field"><label>配送日期</label><input type="date" oninput="updateD(${d.id},'date',this.value)"></div>
      <div>分配數量：${products.map(p => `
        <div style="font-size:12px;">${p.name || '未命名'}: 
        <input type="number" style="width:60px" oninput="updateDI(${d.id},${p.id},+this.value)"></div>
      `).join('')}</div>
    </div>
  `).join('');
  
  updateSummary();
}

function updateP(id,f,v) { products.find(x=>x.id===id)[f]=v; render(); }
function updateD(id,f,v) { deliveries.find(x=>x.id===id)[f]=v; }
function updateDI(did,pid,v) {
  let d = deliveries.find(x=>x.id===did);
  let it = d.items.find(i=>i.prodId===pid);
  if(!it) { it={prodId:pid, qty:0}; d.items.push(it); }
  it.qty = v;
  updateSummary();
}

function updateSummary() {
  const total = products.reduce((s,p)=>s+p.total,0);
  const alloc = deliveries.reduce((s,d)=>s+d.items.reduce((ss,i)=>ss+i.qty,0),0);
  document.getElementById('summary').innerHTML = `<span>總數: ${total}</span> <span>已分配: ${alloc}</span> <span>待分配: ${total-alloc}</span>`;
}

// 驗證函數
function validate() {
  if(!document.getElementById('cust-name').value) { alert('請填寫姓名'); return false; }
  if(products.length === 0) { alert('請新增品項'); return false; }
  return true;
}

// 送出函數
async function submitForm() {
  if(!validate()) return;
  document.getElementById('ov-loading').classList.add('show');
  
  const payload = {
    customerName: document.getElementById('cust-name').value,
    customerPhone: document.getElementById('cust-phone').value,
    products: products,
    deliveries: deliveries
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').classList.remove('show');
    document.getElementById('ov-success').classList.add('show');
  } catch (e) {
    alert('錯誤:' + e);
    document.getElementById('ov-loading').classList.remove('show');
  }
}
</script>
</body>
</html>
