<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --gold-dark: #9e7a45;
    --ink: #2c2416; --ink-mid: #6b5840; --border: #e5d8c5; --orange: #d4622a;
    --sans: 'Noto Sans TC', sans-serif; --serif: 'Noto Serif TC', serif;
  }
  
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.8; margin: 0; padding-bottom: 160px; -webkit-font-smoothing: antialiased; }

  /* 標頭：手機版縮減間距 */
  .header { background: var(--ink); padding: 40px 20px; text-align: center; color: #fff8ee; border-bottom: 5px solid var(--gold); }
  .header-badge { display: inline-block; font-family: var(--serif); font-size: 13px; letter-spacing: 4px; color: var(--gold); border: 1px solid rgba(201,169,110,0.4); padding: 6px 18px; margin-bottom: 15px; }
  .header h1 { font-family: var(--serif); font-size: 26px; margin: 0; letter-spacing: 2px; }
  .header h1 em { font-style: normal; color: var(--gold); }

  .container { max-width: 900px; margin: -20px auto 0; padding: 0 15px; }

  /* 卡片優化 */
  .card { background: var(--warm); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; box-shadow: 0 6px 20px rgba(44,36,22,0.08); overflow: hidden; }
  .card-head { background: var(--ink); padding: 15px 20px; display: flex; align-items: center; gap: 12px; color: #fff8ee; }
  .card-num { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--gold); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .card-title { font-size: 16px; font-weight: 500; letter-spacing: 1px; margin: 0; }
  .card-body { padding: 20px; }

  /* 響應式欄位 */
  .field-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .field-grid { grid-template-columns: 1fr; gap: 0; } }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--ink); }
  .field input, .field select, .field textarea { 
    width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
    font-size: 16px; background: #fff; box-sizing: border-box; transition: 0.3s;
    appearance: none; -webkit-appearance: none; /* 移除 iOS 內建樣式 */
  }

  /* 表格在手機版的處理 */
  .prod-table { width: 100%; border-collapse: collapse; }
  .prod-table th { text-align: left; font-size: 14px; color: var(--ink-mid); padding: 10px; border-bottom: 2px solid var(--border); }
  .prod-table td { padding: 15px 5px; border-bottom: 1px solid #eee; }

  @media (max-width: 500px) {
    .prod-table th:nth-child(3), .prod-table td:nth-child(3) { display: none; } /* 手機隱藏進度文字，改用顏色提示 */
  }

  /* 配送點 */
  .del-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .del-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
  .del-title { color: var(--gold-dark); font-weight: 600; font-size: 17px; }

  .qty-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; padding: 10px 0; border-bottom: 1px dashed #e5d8c5; }
  .qty-input { width: 80px !important; text-align: center; font-weight: 600; color: var(--gold-dark); padding: 8px !important; }

  .btn-add { background: #fff; border: 2px dashed var(--gold); color: var(--gold-dark); padding: 15px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 16px; margin-top: 10px; }

  /* 底部固定欄優化 */
  .summary-bar { 
    background: var(--ink); color: var(--gold); padding: 15px; 
    display: flex; justify-content: space-around; align-items: center; 
    position: sticky; bottom: 85px; z-index: 100; border-top: 2px solid var(--gold);
    font-size: 15px; font-weight: bold; box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
  }
  
  .btn-submit { 
    width: calc(100% - 30px); margin: 0 15px; padding: 20px; 
    background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
    color: white; border: none; font-size: 18px; cursor: pointer; font-weight: 600; 
    letter-spacing: 4px; border-radius: 10px; position: fixed; bottom: 15px; left: 0; z-index: 101;
  }
  .btn-submit:disabled { background: #666; cursor: not-allowed; box-shadow: none; opacity: 0.7; }

  /* 狀態圓點 */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .dot-err { background: var(--orange); }
  .dot-ok { background: #2d8a54; }

  .overlay-box { background: white; color: var(--ink); padding: 30px; border-radius: 15px; text-align: center; width: 80%; }
</style>
</head>
<body>

<header class="header">
  <div class="header-badge">心路基金會・幸福+工場</div>
  <h1>禮盒<em>配送安排單</em></h1>
</header>

<main class="container">
  <section class="card">
    <div class="card-head"><span class="card-num">1</span><h2 class="card-title">訂購人基本資料</h2></div>
    <div class="card-body">
      <div class="field-grid">
        <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()" placeholder="填寫姓名"></div>
        <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone" placeholder="聯絡電話"></div>
      </div>
      <div class="field"><label>備註說明</label><textarea id="cust-note" rows="2" placeholder="如有特殊需求請註明"></textarea></div>
    </div>
  </section>

  <section class="card">
    <div class="card-head"><span class="card-num">2</span><h2 class="card-title">已訂購品項與數量</h2></div>
    <div class="card-body" style="padding: 15px;">
      <table class="prod-table">
        <thead><tr><th>品項名稱</th><th style="width:80px;">總盒數</th><th style="width:100px;">狀態</th><th style="width:30px;"></th></tr></thead>
        <tbody id="prod-body"></tbody>
      </table>
      <button class="btn-add" onclick="addProd()">＋ 新增禮盒品項</button>
    </div>
  </section>

  <section class="card">
    <div class="card-head"><span class="card-num">3</span><h2 class="card-title">配送點安排</h2></div>
    <div class="card-body" style="padding: 15px;">
      <div id="delivery-list"></div>
      <button class="btn-add" onclick="addDel()">＋ 新增配送地址</button>
    </div>
  </section>

  <div class="summary-bar" id="summary"></div>
  <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>確認送出表單</button>
</main>

<div class="overlay" id="ov-loading"><div class="overlay-box"><h3>傳送中...</h3><p>請勿關閉視窗</p></div></div>
<div class="overlay" id="ov-success"><div class="overlay-box"><h2>✓ 送出成功</h2><p>感謝您的安排。</p><button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:var(--gold); border:none; color:white; border-radius:6px;">返回</button></div></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';

const PRODUCT_LIST = [
  "星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款",
  "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款",
  "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款",
  "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層",
  "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥",
  "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組",
  "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組",
  "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)",
  "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)",
  "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"
];

let products = [];
let deliveries = [];

function addProd() {
  products.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', total: 0 });
  render();
}

function addDel() {
  deliveries.push({ id: Date.now(), name: '', date: '', address: '', items: {} });
  render();
}

function render() {
  const pBody = document.getElementById('prod-body');
  pBody.innerHTML = products.map(p => {
    const allocated = deliveries.reduce((sum, d) => sum + (d.items[p.id] || 0), 0);
    const isOk = allocated === p.total && p.total > 0;
    return `
      <tr>
        <td>
          <select onchange="updateP(${p.id},'name',this.value)" style="font-size:14px; padding:8px;">
            ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
          </select>
          ${p.name==='自定義' ? `<input type="text" placeholder="品名" oninput="updateP(${p.id},'customName',this.value)" value="${p.customName}" style="margin-top:5px; padding:8px;">` : ''}
        </td>
        <td><input type="number" class="qty-input" value="${p.total||''}" oninput="updateP(${p.id},'total',+this.value)"></td>
        <td><span style="font-size:12px; color:${isOk?'green':'#d4622a'}">${isOk?'✓':'未完'}</span></td>
        <td><button onclick="removeP(${p.id})" style="border:none;color:#ccc;background:none;font-size:18px;">✕</button></td>
      </tr>
    `;
  }).join('');

  const dList = document.getElementById('delivery-list');
  dList.innerHTML = deliveries.map((d, idx) => `
    <div class="del-card">
      <div class="del-header"><span class="del-title">📍 配送點 ${idx+1}</span><button onclick="removeD(${d.id})" style="color:var(--orange);border:none;background:none;font-size:14px;">移除</button></div>
      <div class="field"><label>收件姓名 *</label><input type="text" oninput="updateD(${d.id},'name',this.value)" value="${d.name}"></div>
      <div class="field"><label>完整地址 *</label><input type="text" oninput="updateD(${d.id},'address',this.value)" value="${d.address}"></div>
      <div class="field"><label>配送日期 *</label><input type="date" oninput="updateD(${d.id},'date',this.value)" value="${d.date}"></div>
      <div style="background:#fdfaf5; padding:10px; border-radius:6px; margin-top:10px;">
        ${products.map(p => {
          const pName = p.name==='自定義' ? (p.customName||'自定義') : p.name;
          return `
            <div class="qty-row">
              <span style="font-size:14px;">${pName}</span>
              <input type="number" class="qty-input" oninput="updateDI(${d.id},${p.id},+this.value)" value="${d.items[p.id]||''}">
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
  updateSummary();
}

function updateP(id,f,v){ products.find(x=>x.id===id)[f]=v; render(); }
function removeP(id){ products = products.filter(x=>x.id!==id); render(); }
function updateD(id,f,v){ deliveries.find(x=>x.id===id)[f]=v; updateSummary(); }
function removeD(id){ deliveries = deliveries.filter(x=>x.id!==id); render(); }
function updateDI(did, pid, v) { deliveries.find(x=>x.id===did).items[pid] = v; updateSummary(); }

function updateSummary() {
  const total = products.reduce((s,p)=>s+p.total,0);
  let allocated = 0;
  deliveries.forEach(d => Object.values(d.items).forEach(v => allocated += (v||0)));
  const diff = total - allocated;
  document.getElementById('summary').innerHTML = `<span>總計: ${total}</span> <span>已分: ${allocated}</span> <span style="color:${diff===0?'#fff':'#f66'}">待分: ${diff}</span>`;
  const isOk = (total > 0 && diff === 0 && document.getElementById('cust-name').value && deliveries.length > 0 && deliveries.every(d => d.name && d.address && d.date));
  document.getElementById('btn-submit').disabled = !isOk;
}

async function submitForm() {
  document.getElementById('ov-loading').classList.add('show');
  const payload = {
    customerName: document.getElementById('cust-name').value,
    customerPhone: document.getElementById('cust-phone').value,
    note: document.getElementById('cust-note').value,
    products: products.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.total })),
    deliveries: deliveries.map(d => ({
      name: d.name, address: d.address, date: d.date,
      items: Object.keys(d.items).map(pid => ({ productName: (products.find(p=>p.id==pid)?.name === '自定義' ? products.find(p=>p.id==pid)?.customName : products.find(p=>p.id==pid)?.name), qty: d.items[pid] })).filter(i => i.qty > 0)
    })),
    submittedAt: new Date().toLocaleString()
  };
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').classList.remove('show');
    document.getElementById('ov-success').classList.add('show');
  } catch (e) {
    alert('失敗，請再試一次');
    document.getElementById('ov-loading').classList.remove('show');
  }
}
addProd();
</script>
</body>
</html>
